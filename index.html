<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Reg. Pensamentos">
<meta name="theme-color" content="#7c6a8e">
<title>Registro de Pensamentos</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0eb;
    --surface: #fffdf9;
    --surface2: #f0ebe3;
    --accent: #7c6a8e;
    --accent2: #c4a882;
    --text: #2c2620;
    --text-muted: #8a7a6e;
    --placeholder: #c8bdb5;
    --border: #ddd5c8;
    --success: #6a9c7a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 80px;
  }

  /* ── HEADER ── */
  header {
    background: var(--accent);
    padding: 22px 20px 18px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
  }
  header h1 { font-family: 'Lora', serif; font-size: 1.3rem; color: #ede7f6; letter-spacing: 0.03em; }
  header p  { font-size: 0.72rem; color: #c9bdd8; margin-top: 3px; letter-spacing: 0.06em; text-transform: uppercase; }

  /* ── TABS ── */
  .tabs { display: flex; background: var(--surface2); border-bottom: 1px solid var(--border); }
  .tab  { flex: 1; padding: 12px 8px; text-align: center; font-size: 0.8rem; font-weight: 500; color: var(--text-muted); cursor: pointer; border-bottom: 3px solid transparent; transition: all 0.2s; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); background: var(--surface); }

  .page { display: none; }
  .page.active { display: block; }

  /* ── FORM ── */
  .form-area { padding: 20px; display: flex; flex-direction: column; gap: 14px; }

  .field-card {
    background: var(--surface);
    border-radius: 14px;
    border: 1px solid var(--border);
    padding: 16px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.04);
  }
  .field-card label {
    display: block;
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--accent);
    font-weight: 500;
    margin-bottom: 10px;
  }
  .field-card textarea {
    width: 100%; border: none; background: transparent;
    font-family: 'DM Sans', sans-serif; font-size: 0.92rem;
    color: var(--text); resize: none; outline: none; line-height: 1.6;
    min-height: 64px;
  }
  .field-card textarea::placeholder { color: var(--placeholder); font-style: italic; opacity: 1; }

  /* ── DATETIME PICKER ── */
  .datetime-row {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }
  .datetime-row input[type="date"],
  .datetime-row input[type="time"] {
    flex: 1;
    min-width: 120px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface2);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.92rem;
    color: var(--text);
    padding: 9px 12px;
    outline: none;
    -webkit-appearance: none;
  }
  .datetime-row input[type="date"]:focus,
  .datetime-row input[type="time"]:focus {
    border-color: var(--accent);
  }
  .btn-now {
    padding: 9px 14px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface2);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    color: var(--text-muted);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
  }
  .btn-now:active { background: var(--accent); color: white; border-color: var(--accent); }

  /* ── SLIDER ── */
  .slider-row { display: flex; align-items: center; gap: 12px; }
  .slider-row input[type=range] { flex: 1; accent-color: var(--accent); height: 6px; cursor: pointer; }
  .slider-val { font-family: 'Lora', serif; font-size: 1.3rem; color: var(--accent); min-width: 30px; text-align: right; }

  /* ── FORM ACTIONS ── */
  .form-actions { display: flex; gap: 10px; padding: 0 20px 10px; }
  .btn-save  { flex: 1; padding: 14px; border-radius: 14px; border: none; background: var(--accent); color: white; font-family: 'DM Sans', sans-serif; font-weight: 500; font-size: 0.95rem; cursor: pointer; }
  .btn-clear { padding: 14px 18px; border-radius: 14px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); font-family: 'DM Sans', sans-serif; font-size: 0.9rem; cursor: pointer; }

  /* ── LOCKED BANNER ── */
  .locked-banner {
    margin: 24px 20px 0;
    background: #fff3cd;
    border: 1.5px solid #f0ad4e;
    border-radius: 16px;
    padding: 22px 20px;
    text-align: center;
  }
  .locked-banner h3 { font-family: 'Lora', serif; font-size: 1rem; color: #7a5000; margin-bottom: 8px; }
  .locked-banner p  { font-size: 0.82rem; color: #7a5000; line-height: 1.5; margin-bottom: 14px; }
  .btn-go-history { padding: 11px 22px; border-radius: 12px; border: none; background: #f0ad4e; color: white; font-family: 'DM Sans', sans-serif; font-weight: 500; font-size: 0.9rem; cursor: pointer; }

  /* ── HISTORY ── */
  .history-area { padding: 20px; }
  .history-empty { text-align: center; padding: 60px 20px; color: var(--text-muted); font-style: italic; }
  .history-empty .icon { font-size: 3rem; margin-bottom: 12px; opacity: 0.4; }

  .days-counter { font-size: 0.76rem; color: var(--text-muted); text-align: center; padding: 0 0 14px; }
  .days-counter span { color: var(--accent); font-weight: 700; font-size: 0.88rem; }

  .history-item { background: var(--surface); border-radius: 14px; border: 1px solid var(--border); padding: 16px; margin-bottom: 12px; cursor: pointer; }
  .history-date { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--accent2); margin-bottom: 6px; }
  .history-situation { font-size: 0.9rem; font-weight: 500; margin-bottom: 4px; color: var(--text); line-height: 1.4; }
  .history-feeling { font-size: 0.8rem; color: var(--text-muted); }
  .history-anx { display: inline-block; margin-top: 8px; background: var(--surface2); color: var(--accent); font-size: 0.72rem; padding: 3px 10px; border-radius: 20px; font-weight: 500; }
  .btn-del { float: right; background: none; border: none; color: var(--text-muted); font-size: 1.1rem; cursor: pointer; padding: 0 0 0 10px; }

  /* ── SEND PANEL ── */
  .send-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 14px 16px;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    flex-wrap: wrap;
  }
  .send-panel-label { font-size: 0.78rem; color: var(--text-muted); flex: 1; min-width: 100px; }
  .send-panel-label strong { display: block; color: var(--text); font-size: 0.86rem; margin-bottom: 2px; }
  .send-panel-btns { display: flex; gap: 7px; flex-wrap: wrap; }
  .btn-export       { padding: 8px 13px; border-radius: 10px; border: none; background: var(--success); color: white; font-family: 'DM Sans', sans-serif; font-size: 0.8rem; font-weight: 500; cursor: pointer; white-space: nowrap; }
  .btn-export-email { padding: 8px 13px; border-radius: 10px; border: none; background: var(--accent); color: white; font-family: 'DM Sans', sans-serif; font-size: 0.8rem; font-weight: 500; cursor: pointer; white-space: nowrap; }
  .btn-export-clear { padding: 8px 13px; border-radius: 10px; border: 1px solid #bbb; background: transparent; color: #666; font-family: 'DM Sans', sans-serif; font-size: 0.8rem; cursor: pointer; white-space: nowrap; }

  /* ── TOAST ── */
  .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--text); color: white; padding: 10px 20px; border-radius: 30px; font-size: 0.85rem; opacity: 0; transition: all 0.3s; z-index: 200; white-space: nowrap; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <h1>🧠 Registro de Pensamentos</h1>
  <p>Terapia Cognitivo-Comportamental</p>
</header>

<div class="tabs">
  <div class="tab active" onclick="showTab('form',this)">📝 Formulário</div>
  <div class="tab" onclick="showTab('history',this)">📋 Histórico</div>
</div>

<!-- FORM -->
<div class="page active" id="page-form">

  <!-- Locked banner -->
  <div id="form-locked" class="locked-banner" style="display:none">
    <h3>🔒 Limite de 10 dias atingido</h3>
    <p>Você não pode salvar novos registros até enviar o histórico e limpar o ciclo.</p>
    <button class="btn-go-history" onclick="goHistory()">📋 Ir para o Histórico</button>
  </div>

  <div id="form-content">
    <div class="form-area">

      <!-- Data / Hora -->
      <div class="field-card">
        <label>📅 Data / Hora</label>
        <div class="datetime-row">
          <input type="date" id="f-date">
          <input type="time" id="f-time">
          <button class="btn-now" onclick="setNow()">Agora</button>
        </div>
      </div>

      <!-- Situação -->
      <div class="field-card">
        <label>📍 Situação</label>
        <textarea id="f-situation" placeholder="onde você estava, o que aconteceu, com quem..."></textarea>
      </div>

      <!-- Pensamento Automático -->
      <div class="field-card">
        <label>💭 Pensamento Automático</label>
        <textarea id="f-thought" placeholder="o que passou pela sua cabeça naquele momento..."></textarea>
      </div>

      <!-- Sentimento -->
      <div class="field-card">
        <label>❤️ Sentimento</label>
        <textarea id="f-feeling" placeholder="que emoção você sentiu — ansiedade, tristeza, raiva..."></textarea>
      </div>

      <!-- Ansiedade inicial -->
      <div class="field-card">
        <label>📊 Grau de Ansiedade Inicial (0–10)</label>
        <div class="slider-row">
          <input type="range" min="0" max="10" value="0" id="f-anxiety1"
            oninput="document.getElementById('anx1-val').textContent=this.value">
          <span class="slider-val" id="anx1-val">0</span>
        </div>
      </div>

      <!-- Reação -->
      <div class="field-card">
        <label>⚡ Reação / Comportamento</label>
        <textarea id="f-reaction" placeholder="como você reagiu, o que fez..."></textarea>
      </div>

      <!-- Pensamento Alternativo -->
      <div class="field-card">
        <label>🌱 Pensamento Alternativo</label>
        <textarea id="f-alt-thought" placeholder="uma forma mais equilibrada de ver a situação..."></textarea>
      </div>

      <!-- Ansiedade final -->
      <div class="field-card">
        <label>📊 Grau de Ansiedade Final (0–10)</label>
        <div class="slider-row">
          <input type="range" min="0" max="10" value="0" id="f-anxiety2"
            oninput="document.getElementById('anx2-val').textContent=this.value">
          <span class="slider-val" id="anx2-val">0</span>
        </div>
      </div>

    </div>
    <div class="form-actions">
      <button class="btn-clear" onclick="clearForm()">🗑️ Limpar</button>
      <button class="btn-save"  onclick="saveRecord()">💾 Salvar Registro</button>
    </div>
  </div>

</div>

<!-- HISTORY -->
<div class="page" id="page-history">
  <div class="history-area" id="history-area"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const EMAIL_DEST = 'vinnitog@gmail.com';
const MAX_DAYS   = 10;

let records = [];
try { records = JSON.parse(localStorage.getItem('rp_records') || '[]'); } catch(e) { records = []; }

function storageSave(d) { try { localStorage.setItem('rp_records', JSON.stringify(d)); } catch(e) {} }

// ── INIT DATE ──────────────────────────────────────────────────
function setNow() {
  const now = new Date();
  // Usa getFullYear/Month/Date (locais) em vez de toISOString() (UTC)
  // para evitar que o fuso UTC-3 de Brasília avance o dia erroneamente
  const y  = now.getFullYear();
  const mo = String(now.getMonth() + 1).padStart(2, '0');
  const d  = String(now.getDate()).padStart(2, '0');
  const hh = String(now.getHours()).padStart(2, '0');
  const mm = String(now.getMinutes()).padStart(2, '0');
  document.getElementById('f-date').value = y + '-' + mo + '-' + d;
  document.getElementById('f-time').value = hh + ':' + mm;
}
// Pre-fill date/time on load
setNow();

// ── TABS ──────────────────────────────────────────────────────
function showTab(name, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  el.classList.add('active');
  if (name === 'history') renderHistory();
  if (name === 'form') applyLockUI();
}

function goHistory() {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-history').classList.add('active');
  document.querySelectorAll('.tab')[1].classList.add('active');
  renderHistory();
}

// ── LOCK ──────────────────────────────────────────────────────
function countDays() {
  return new Set(records.map(r => r.dateKey)).size;
}
function isLocked() { return countDays() >= MAX_DAYS; }
function applyLockUI() {
  const locked = isLocked();
  document.getElementById('form-locked').style.display  = locked ? 'block' : 'none';
  document.getElementById('form-content').style.display = locked ? 'none'  : 'block';
}

// ── FORM ──────────────────────────────────────────────────────
function clearForm() {
  setNow();
  ['f-situation','f-thought','f-feeling','f-reaction','f-alt-thought']
    .forEach(id => { document.getElementById(id).value = ''; });
  document.getElementById('f-anxiety1').value = 0; document.getElementById('anx1-val').textContent = '0';
  document.getElementById('f-anxiety2').value = 0; document.getElementById('anx2-val').textContent = '0';
}

function getDatetimeDisplay() {
  const d = document.getElementById('f-date').value;
  const t = document.getElementById('f-time').value;
  if (!d) return new Date().toLocaleString('pt-BR');
  const [y, m, dd] = d.split('-');
  return `${dd}/${m}/${y}${t ? ', ' + t : ''}`;
}

function saveRecord() {
  if (isLocked()) { showToast('Limite atingido. Envie o histórico primeiro.'); return; }

  const rec = {
    id:         Date.now(),
    datetime:   getDatetimeDisplay(),
    dateKey:    document.getElementById('f-date').value || new Date().toLocaleDateString('pt-BR'),
    situation:  document.getElementById('f-situation').value.trim(),
    thought:    document.getElementById('f-thought').value.trim(),
    feeling:    document.getElementById('f-feeling').value.trim(),
    anxiety1:   document.getElementById('f-anxiety1').value,
    reaction:   document.getElementById('f-reaction').value.trim(),
    altThought: document.getElementById('f-alt-thought').value.trim(),
    anxiety2:   document.getElementById('f-anxiety2').value,
  };

  if (!rec.situation && !rec.thought && !rec.feeling) {
    showToast('Preencha pelo menos situação, pensamento ou sentimento'); return;
  }

  records.unshift(rec);
  storageSave(records);
  clearForm();
  showToast('Registro salvo! 💜');
  setTimeout(() => goHistory(), 600);
}

// ── EXPORT ────────────────────────────────────────────────────
function buildExportText() {
  const lines = [
    'REGISTRO DE PENSAMENTOS — TCC',
    'Exportado em: ' + new Date().toLocaleString('pt-BR'),
    'Total de registros: ' + records.length,
    '='.repeat(50), ''
  ];
  records.forEach((r, i) => {
    lines.push(`REGISTRO ${i + 1} — ${r.datetime}`);
    lines.push('-'.repeat(40));
    if (r.situation)   lines.push(`Situação:               ${r.situation}`);
    if (r.thought)     lines.push(`Pensamento automático:  ${r.thought}`);
    if (r.feeling)     lines.push(`Sentimento:             ${r.feeling}`);
    lines.push(         `Ansiedade inicial:      ${r.anxiety1}/10`);
    if (r.reaction)    lines.push(`Reação:                 ${r.reaction}`);
    if (r.altThought)  lines.push(`Pensamento alternativo: ${r.altThought}`);
    lines.push(         `Ansiedade final:        ${r.anxiety2}/10`);
    lines.push('');
  });
  return lines.join('\n');
}

function downloadExport() {
  const blob = new Blob([buildExportText()], {type: 'text/plain;charset=utf-8'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = `registro-pensamentos-${new Date().toLocaleDateString('pt-BR').replace(/\//g,'-')}.txt`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('Arquivo baixado! ⬇️');
}

function openEmail() {
  const subject = encodeURIComponent('Registro de Pensamentos TCC — ' + new Date().toLocaleDateString('pt-BR'));
  const body    = encodeURIComponent(buildExportText());
  window.open(`https://mail.google.com/mail/?view=cm&to=${EMAIL_DEST}&su=${subject}&body=${body}`, '_blank');
}

function confirmClear() {
  if (confirm('Histórico exportado?\n\nAo confirmar, todos os registros serão apagados e um novo ciclo começará.')) {
    records = [];
    storageSave(records);
    renderHistory();
    showToast('Histórico limpo! Novo ciclo iniciado ✨');
  }
}

// ── HISTORY ───────────────────────────────────────────────────
function renderHistory() {
  const area   = document.getElementById('history-area');
  const dias   = countDays();
  const locked = dias >= MAX_DAYS;
  let html = '';

  if (records.length > 0) {
    const urgentLabel = locked
      ? `<strong style="color:#c0393b">🔒 Limite atingido — envie e limpe para continuar</strong>`
      : `<strong>Enviar histórico</strong>`;
    const urgentNote = locked
      ? `Você atingiu ${MAX_DAYS} dias. <b>Novos registros estão bloqueados</b> até enviar e limpar.`
      : `Envie a qualquer momento e limpe para começar um novo ciclo.`;
    html += `
    <div class="send-panel" style="${locked ? 'border-color:#f0ad4e;background:#fffbf0' : ''}">
      <div class="send-panel-label">${urgentLabel}<span>${urgentNote}</span></div>
      <div class="send-panel-btns">
        <button class="btn-export"       onclick="downloadExport()">⬇️ .txt</button>
        <button class="btn-export-email" onclick="openEmail()">📧 Gmail</button>
        <button class="btn-export-clear" onclick="confirmClear()">🗑️ Limpar</button>
      </div>
    </div>`;
  }

  if (!records.length) {
    html += `<div class="history-empty"><div class="icon">📖</div><p>Nenhum registro ainda.<br>Preencha o formulário!</p></div>`;
  } else {
    html += `<div class="days-counter">📅 <span>${dias}</span> dia${dias!==1?'s':''} de ${MAX_DAYS}</div>`;
    html += records.map(r => `
      <div class="history-item" onclick="loadRecord(${r.id})">
        <button class="btn-del" onclick="event.stopPropagation();deleteRecord(${r.id})">🗑</button>
        <div class="history-date">${r.datetime}</div>
        <div class="history-situation">${r.situation || '(sem situação)'}</div>
        <div class="history-feeling">😔 ${r.feeling || '–'}</div>
        <div class="history-anx">Ansiedade: ${r.anxiety1}/10 → ${r.anxiety2}/10</div>
      </div>`).join('');
  }

  area.innerHTML = html;
  applyLockUI();
}

function loadRecord(id) {
  const r = records.find(x => x.id === id);
  if (!r) return;
  // Parse date back to input format
  const parts = r.datetime.split(',')[0].trim().split('/');
  if (parts.length === 3) {
    document.getElementById('f-date').value = `${parts[2]}-${parts[1].padStart(2,'0')}-${parts[0].padStart(2,'0')}`;
  }
  const timePart = r.datetime.includes(',') ? r.datetime.split(',')[1].trim() : '';
  document.getElementById('f-time').value = timePart;
  document.getElementById('f-situation').value   = r.situation  || '';
  document.getElementById('f-thought').value     = r.thought    || '';
  document.getElementById('f-feeling').value     = r.feeling    || '';
  document.getElementById('f-anxiety1').value    = r.anxiety1;
  document.getElementById('anx1-val').textContent= r.anxiety1;
  document.getElementById('f-anxiety2').value    = r.anxiety2;
  document.getElementById('anx2-val').textContent= r.anxiety2;
  document.getElementById('f-reaction').value    = r.reaction   || '';
  document.getElementById('f-alt-thought').value = r.altThought || '';

  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-form').classList.add('active');
  document.querySelectorAll('.tab')[0].classList.add('active');
  applyLockUI();
  showToast('Registro carregado para edição');
}

function deleteRecord(id) {
  if (!confirm('Deletar este registro?')) return;
  records = records.filter(r => r.id !== id);
  storageSave(records);
  renderHistory();
  showToast('Registro deletado');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ── INIT ──────────────────────────────────────────────────────
applyLockUI();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
